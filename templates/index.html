{% extends 'base.html' %}
{% include 'header.html' %}

{% block title %} Home {% endblock %}

{% block body %}

<div class="container">
    <div class="row">
        <div class="col md-12">

            <div class="p-5 mb-4 bg-light rounded-3">


                <h2>Manage <b>Employees</b> <button type="button" class="btn btn-success float-end" data-bs-toggle="modal" data-bs-target="#mymodal">Add New Employee</button></h2>

                <table class="table table-hover table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>

                    <tr>
                        <td>01</td>
                        <td>John</td>
                        <td>John.Doe@gmail.com</td>
                        <td>0123456789</td>
                        <td>
                            <a href="" class="btn btn-warning btn-xs" data-bs-toggle="modal" data-bs-target="#modal-edit">Edit</a>
                            <a href="" class="btn btn-danger btn-xs" onclick="return confirm('Are You Sure You Want to Delete')">Delete</a>
                        </td>
                    </tr>

                    <div id="modal-edit" class="modal fade" role="dialog">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h4 class="modal-title">Update Information</h4>
                                </div>
                                <div class="modal-body">
                                    <form action="" method="POST">

                                        <div class="form-group">

                                            <label>Name:</label>
                                            <input type="hidden" name="id" value="id">
                                            <input type="text" class="form-control" name="name" value="change">

                                        </div>


                                            <div class="form-group">

                                            <label>Email:</label>
                                            <input type="email" class="form-control" name="email" value="change">

                                        </div>

                                            <div class="form-group">

                                            <label>Phone:</label>
                                            <input type="tel" class="form-control" name="phone" value="change">

                                        </div>

                                            <div class="form-group">

                                            <button type="submit" class="btn btn-primary">Update</button>


                                        </div>

                                        


                                    </form>
                                </div>
                                <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </table>


            </div>

            <div id="mymodal" class="modal fade" role="dialog">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h4 class="modal-title">Add Employee</h4>
                        </div>
                        <div class="modal-body">
                            <form action="" method="POST">

                                <div class="form-group">

                                    <label>Name:</label>
                                    <input type="text" class="form-control" name="name" required>

                                </div>


                                 <div class="form-group">

                                    <label>Email:</label>
                                    <input type="email" class="form-control" name="email" required>

                                </div>

                                 <div class="form-group">

                                    <label>Phone:</label>
                                    <input type="tel" class="form-control" name="phone" required>

                                </div>

                                 <div class="form-group">

                                    <button type="submit" class="btn btn-primary">Add Employee</button>


                                </div>

                               

                            </form>
                        </div>
                         <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>

                    </div>
                </div>
            </div>

        </div> 
    </div>
</div>

{% endblock %}
